<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ф1 2028 • Глобальное Обновление</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <style>
        body { margin: 0; }
        .header { 
            background: linear-gradient(135deg, #1a1a1a 0%, #e10600 100%); 
            color: white; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .logo { color: white; text-shadow: 0 2px 8px rgba(0,0,0,0.6); }
        .new-season { background: #ffd700; color: #000; padding: 4px 14px; border-radius: 30px; font-weight: 800; font-size: 0.75rem; }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-left">
            <div class="logo">Ф1 <span>2028</span> <span class="new-season">ГЛОБАЛЬНОЕ ОБНОВЛЕНИЕ</span></div>
            <div class="header-stats">
                <span id="teamCount">11</span> Команд ·
                <span id="pilotCount">21</span> Пилота ·
                <span id="reserveCount">8</span> Резерв
            </div>
        </div>
        
        <div class="header-right">
            <button class="music-btn" id="musicBtn" onclick="toggleMusic()">🎵 Включить музыку</button>
            <div class="countdown">
                ⏱️ <span id="days">0</span>д <span id="hours">0</span>ч 
                <span id="minutes">0</span>м <span id="seconds">0</span>с
            </div>
        </div>

        <nav class="header-nav">
            <button class="tab active" data-tab="pilots">Пилоты</button>
            <button class="tab" data-tab="standings">Чемпионат</button>
            <button class="tab" data-tab="calendar">Календарь</button>
            <button class="tab" data-tab="history">🏆 История</button>
            <button class="tab" data-tab="transfers">📋 Трансферы</button>
        </nav>
    </header>

    <main>
        <!-- Пилоты -->
        <section class="content active" id="pilots">
            <div class="filter-bar" id="filterBar"></div>
            <div class="grid" id="teamGrid"></div>
        </section>

        <!-- Чемпионат -->
        <section class="content" id="standings">
            <div class="standings-header">
                <h2>ЧЕМПИОНАТ 2028</h2>
                <p class="muted">🏆 После 1 этапа • Новый сезон</p>
            </div>
            <div id="standingsContent"></div>
        </section>

        <!-- Календарь -->
        <section class="content" id="calendar">
            <h2>КАЛЕНДАРЬ 2028</h2>
            <p class="muted">24 этапа</p>
            <div class="calendar-list" id="calendarList"></div>
        </section>

        <!-- История -->
        <section class="content" id="history">
            <h2>🏆 ИСТОРИЯ ПОБЕДИТЕЛЕЙ</h2>
            <div class="history-grid" id="historyGrid"></div>
        </section>

        <!-- Трансферы -->
        <section class="content" id="transfers">
            <h2>📋 ИСТОРИЯ ТРАНСФЕРОВ</h2>
            <div class="transfers-list" id="transfersList"></div>
        </section>
    </main>

    <!-- Модальное окно пилота -->
    <div class="modal" id="modal">
        <div class="modal-box">
            <button class="modal-close" id="modalClose">×</button>
            <img id="modalPhoto" class="modal-photo" alt="">
            <div class="modal-info">
                <div id="modalNumber" class="modal-number"></div>
                <div id="modalName" class="modal-name"></div>
                <div id="modalTeam" class="modal-team"></div>
                <div class="modal-stats">
                    <div><span class="stat-label">Страна</span><span id="modalCountry"></span></div>
                    <div><span class="stat-label">Возраст</span><span id="modalAge"></span></div>
                    <div><span class="stat-label">Команда</span><span id="modalTeamName"></span></div>
                    <div><span class="stat-label">Бюджет</span><span id="modalBudget"></span></div>
                </div>
                <a id="modalLink" href="#" target="_blank" class="modal-link">📖 Википедия →</a>
            </div>
        </div>
    </div>

    <script src="scripts/app.js"></script>
</body>
</html>
