<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F1 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>

    <header class="header">
        <div class="header-left">
            <div class="logo">F1<span>2026</span></div>
            <div class="header-stats">
                <span id="teamCount">11</span> Teams ·
                <span id="pilotCount">22</span> Drivers ·
                <span id="reserveCount">12</span> Reserve
            </div>
        </div>
        <nav class="header-nav">
            <button class="tab active" data-tab="pilots">Drivers</button>
            <button class="tab" data-tab="standings">Championship</button>
            <button class="tab" data-tab="calendar">Calendar</button>
        </nav>
    </header>

    <main>
        <!-- Пилоты -->
        <section class="content active" id="pilots">
            <div class="grid" id="teamGrid"></div>
        </section>

        <!-- Чемпионат -->
        <section class="content" id="standings">
            <div class="standings-header">
                <h2>2026 CHAMPIONSHIP</h2>
                <p class="muted">Season not started yet</p>
            </div>
            <div id="standingsContent"></div>
        </section>

        <!-- Календарь -->
        <section class="content" id="calendar">
            <div class="calendar-header">
                <h2>2026 CALENDAR</h2>
                <p class="muted">24 races</p>
            </div>
            <div class="calendar-list" id="calendarList"></div>
        </section>
    </main>

    <!-- Модалка -->
    <div class="modal" id="modal">
        <div class="modal-box">
            <button class="modal-close" id="modalClose">×</button>
            <div class="modal-content">
                <img class="modal-photo" id="modalPhoto" src="" alt="">
                <div class="modal-info">
                    <div class="modal-number" id="modalNumber">4</div>
                    <div class="modal-name" id="modalName">Lando Norris</div>
                    <div class="modal-team" id="modalTeam">McLaren</div>
                    <div class="modal-stats">
                        <div><span class="stat-label">Country</span><span class="stat-value" id="modalCountry">🇬🇧 Great Britain</span></div>
                        <div><span class="stat-label">Age</span><span class="stat-value" id="modalAge">25</span></div>
                        <div><span class="stat-label">Grands Prix</span><span class="stat-value" id="modalRaces">113</span></div>
                        <div><span class="stat-label">Wins</span><span class="stat-value" id="modalWins">0</span></div>
                        <div><span class="stat-label">Podiums</span><span class="stat-value" id="modalPodiums">0</span></div>
                        <div><span class="stat-label">Team Budget</span><span class="stat-value" id="modalBudget">$130M</span></div>
                    </div>
                    <a class="modal-link" id="modalLink" href="#" target="_blank">View on Wikipedia →</a>
                </div>
            </div>
        </div>
    </div>

    <script src="scripts/app.js"></script>
</body>
</html>
