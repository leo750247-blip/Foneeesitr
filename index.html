<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 2027 • Сезон</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #e10600; --accent: #ff3366; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f1629 100%);
            color: #eee;
            font-family: 'Inter', sans-serif;
        }
        header {
            background: rgba(10,10,10,0.97);
            backdrop-filter: blur(12px);
            border-bottom: 5px solid var(--red);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-family: 'Space Grotesk', sans-serif; font-size: 2.7rem; font-weight: 700; letter-spacing: -2px; }
        .logo span { color: var(--red); }

        .nav button {
            padding: 10px 22px;
            background: #1f1f1f;
            border: none;
            color: #ddd;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .nav button.active { background: var(--red); color: white; box-shadow: 0 0 20px rgba(225,6,0,0.5); }

        .music-controls button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }

        .container { max-width: 1350px; margin: 0 auto; padding: 40px 5%; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 26px;
        }
        .team-card {
            background: rgba(255,255,255,0.07);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(225,6,0,0.25);
            transition: all 0.4s;
        }
        .team-card:hover { transform: translateY(-12px); box-shadow: 0 25px 50px rgba(225,6,0,0.3); }

        .team-header { height: 9px; background: linear-gradient(90deg, var(--team-color), var(--accent)); }
        .team-body { padding: 24px; }
        .team-name { font-size: 1.7rem; font-weight: 700; margin-bottom: 20px; }
        .pilot {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 0;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .pilot-photo {
            width: 64px; height: 64px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; border: 3px solid var(--team-color);
        }

        .race {
            background: rgba(255,255,255,0.06);
            padding: 24px;
            border-radius: 18px;
            margin-bottom: 30px;
            border-left: 6px solid var(--red);
        }
        .race h3 { margin-bottom: 18px; font-size: 1.4rem; }
        .pos {
            padding: 12px 16px;
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            margin-bottom: 8px;
        }
        .gold { border-left: 5px solid #ffd700; }
        .silver { border-left: 5px solid #c0c0c0; }
        .bronze { border-left: 5px solid #cd7f32; }
    </style>
</head>
<body>

    <header>
        <div class="logo">F1 <span>2027</span></div>
        <div class="nav">
            <button class="active" onclick="switchTab(0)">Команды</button>
            <button onclick="switchTab(1)">Чемпионат</button>
        </div>
        <div class="music-controls">
            <button onclick="toggleMusic()">🎵 Kimi Kimi Antonelli</button>
        </div>
    </header>

    <div class="container">
        <div id="tab0" class="tab-content active">
            <h2 style="text-align:center; font-size:2.6rem; margin-bottom:40px;">Команды и Пилоты 2027</h2>
            <div class="grid" id="teamsGrid"></div>
        </div>

        <div id="tab1" class="tab-content">
            <h2 style="text-align:center; font-size:2.6rem; margin-bottom:40px;">Результаты Сезона 2027</h2>
            <div id="championship"></div>
        </div>
    </div>

    <script>
        const teams = [
            {name:"Ferrari", color:"#dc0000", flag:"🇮🇹", pilots:[{name:"Андрес Пикалио", num:17, flag:"🇪🇸"},{name:"Кристано Грасси", num:55, flag:"🇮🇹"}]},
            {name:"McLaren", color:"#ff8700", flag:"🇬🇧", pilots:[{name:"Ворон Эльбон", num:23, flag:"🇹🇭"},{name:"Вивиан Хьюго", num:31, flag:"🇫🇷"}]},
            {name:"Mercedes", color:"#00d2be", flag:"🇩🇪", pilots:[{name:"Энцо Фрага", num:12, flag:"🇬🇷"},{name:"Леонид Лавров", num:88, flag:"🇷🇺"}]},
            {name:"Red Bull", color:"#1e41b0", flag:"🇦🇹", pilots:[{name:"Сандрико Марколело", num:3, flag:"🇮🇹"},{name:"Алексей Ковец", num:19, flag:"🇧🇬"}]},
            {name:"Aston Martin", color:"#006f62", flag:"🇬🇧", pilots:[{name:"Эскобар Сантос", num:14, flag:"🇧🇷"},{name:"Макс Бондарев", num:18, flag:"🇺🇦"}]},
            {name:"Alpine", color:"#ff6b9d", flag:"🇫🇷", pilots:[{name:"Федерико Армани", num:7, flag:"🇮🇹"},{name:"Еттан Дюпон", num:45, flag:"🇫🇷"}]},
            {name:"Audi", color:"#bb0a21", flag:"🇩🇪", pilots:[{name:"Салюти Ботван", num:27, flag:"🇲🇩"},{name:"Арленс Оттан", num:5, flag:"🇧🇬"}]},
            {name:"Racing Bulls", color:"#4d7aff", flag:"🇮🇹", pilots:[{name:"Дех Хартор", num:4, flag:"🇬🇧"},{name:"Ларенс Олсон", num:30, flag:"🇪🇨"}]},
            {name:"Cadillac", color:"#c8102e", flag:"🇺🇸", pilots:[{name:"Тони Монтес", num:20, flag:"🇳🇱"},{name:"Даниэль Джеймс", num:24, flag:"🏴󠁧󠁢󠁷󠁬󠁳󠁿"}]},
            {name:"Williams", color:"#00a3e0", flag:"🇬🇧", pilots:[{name:"Валентино Романо", num:81, flag:"🇮🇹"},{name:"Габриэль Чуруни", num:37, flag:"🇹🇭"}]},
            {name:"Haas", color:"#b6babd", flag:"🇺🇸", pilots:[{name:"Альберто Андрио", num:22, flag:"🏴󠁧󠁢󠁳󠁣󠁴󠁿"}]}
        ];

        function renderTeams() {
            const grid = document.getElementById('teamsGrid');
            grid.innerHTML = '';
            teams.forEach(team => {
                let html = `<div class="team-card" style="--team-color:${team.color}">
                    <div class="team-header"></div>
                    <div class="team-body">
                        <div class="team-name">${team.flag} ${team.name}</div>`;
                team.pilots.forEach(p => {
                    html += `<div class="pilot">
                        <div class="pilot-photo">${p.flag}</div>
                        <div>
                            <div class="pilot-name">${p.name}</div>
                            <div>№${p.num}</div>
                        </div>
                    </div>`;
                });
                html += `</div></div>`;
                grid.innerHTML += html;
            });
        }

        const championshipHTML = `
            <div class="race"><h3>🇨🇦 Гран-при Канады</h3><div class="podium">
                <div class="pos gold">🥇 Габриэль Чуруни (Уильямс) ⭐⭐⭐</div>
                <div class="pos silver">🥈 Ворон Эльбон (Макларен)</div>
                <div class="pos bronze">🥉 Арленс Оттан (Ауди)</div>
            </div></div>
            <div class="race"><h3>🇪🇸 Гран-при Испании</h3><div class="podium">
                <div class="pos gold">🥇 Андрес Пикалио (Феррари)</div>
                <div class="pos silver">🥈 Энцо Фрага (Мерседес)</div>
                <div class="pos bronze">🥉 Ворон Эльбон (Макларен)</div>
            </div></div>
            <div class="race"><h3>🇲🇨 Гран-при Монако</h3><div class="podium">
                <div class="pos gold">🥇 Даниэль Джеймс (Кадилак) ⭐⭐⭐</div>
                <div class="pos silver">🥈 Вивиан Хьюго (Макларен)</div>
                <div class="pos bronze">🥉 Энцо Фрага (Мерседес)</div>
            </div></div>
            <div class="race"><h3>🇺🇸 Гран-при Майами</h3><div class="podium">
                <div class="pos gold">🥇 Арленс Оттан (Ауди) ⭐</div>
                <div class="pos silver">🥈 Ворон Эльбон (Макларен)</div>
                <div class="pos bronze">🥉 Леонид Лавров (Мерседес)</div>
            </div></div>
            <div class="race"><h3>🇮🇹 Гран-при Эмилии-Романьи</h3><div class="podium">
                <div class="pos gold">🥇 Кристано Грасси (Феррари) ⭐</div>
                <div class="pos silver">🥈 Андрес Пикалио (Феррари)</div>
                <div class="pos bronze">🥉 Энцо Фрага (Мерседес)</div>
            </div></div>
            <div class="race"><h3>🇨🇳 Гран-при Китая</h3><div class="podium">
                <div class="pos gold">🥇 Вивиан Хьюго (Макларен)</div>
                <div class="pos silver">🥈 Арленс Оттан (Ауди) ⭐</div>
                <div class="pos bronze">🥉 Федерико Армани (Альпин) ⭐</div>
            </div></div>
            <div class="race"><h3>🇧🇭 Гран-при Бахрейна</h3><div class="podium">
                <div class="pos gold">🥇 Энцо Фрага (Мерседес)</div>
                <div class="pos silver">🥈 Ворон Эльбон (Макларен)</div>
                <div class="pos bronze">🥉 Андрес Пикалио (Феррари)</div>
            </div></div>
            <div class="race"><h3>🇦🇺 Гран-при Австралии</h3><div class="podium">
                <div class="pos gold">🥇 Андрес Пикалио (Феррари)</div>
                <div class="pos silver">🥈 Вивиан Хьюго (Макларен)</div>
                <div class="pos bronze">🥉 Арленс Оттан (Ауди) ⭐</div>
            </div></div>
        `;

        let audio = null;

        function toggleMusic() {
            if (!audio) {
                audio = new Audio('Maxx_Power_Carte_Blanq_-_Kimi_Antonelli_81266002.mp3');
                audio.loop = true;
            }
            if (audio.paused) audio.play();
            else audio.pause();
        }

        function switchTab(n) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('tab' + n).classList.add('active');
            document.querySelectorAll('.nav button').forEach((btn, i) => btn.classList.toggle('active', i === n));
        }

        window.onload = () => {
            renderTeams();
            document.getElementById('championship').innerHTML = championshipHTML;
        };
    </script>
</body>
</html>
